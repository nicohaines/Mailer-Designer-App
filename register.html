<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="./style.css">
    <script defer src="./user.js"></script>
</head>

<body>
    <nav class="navbar">
        <div>
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="login.html">Account</a>
        </div>
    </nav>

    <main class="login-container">
        <img src="images/banner.jpg" alt="Banner" class="login-banner">
        <div class="box">
            <h2>Register</h2>
            <form id="register">
                <input class="fa" id="firstName" type="text" placeholder="First Name" required>
                <input class="fa" id="lastName" type="text" placeholder="Last Name" required>
                <input class="fa" id="email" type="email" placeholder="Email" required>
                <input class="fa" id="password" type="password" placeholder="Password" required>
                <input class="fa" type="submit" value="Register">
            </form>

            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </main>

    <script src="./scripts/user.js"></script>
</body>

</html>
